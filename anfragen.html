<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FootballForYou – Anfragen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Zum Inhalt springen</a>

  <header class="site-header">
    <div class="container">
      <h1>FootballForYou</h1>
      <p>Anfragefunktion</p>
    </div>
  </header>

  <nav class="main-nav" aria-label="Hauptnavigation">
    <div class="container nav-container">
      <a href="index.html" class="nav-button">🏠 <span>Start</span></a>
      <a href="vorstand.html" class="nav-button">📋 <span>Vorstand</span></a>
      <a href="trainer.html" class="nav-button">👨‍🏫 <span>Trainer</span></a>
      <a href="spieler.html" class="nav-button">⚽ <span>Spieler</span></a>
      <a href="termine.html" class="nav-button">📅 <span>Termine</span></a>
      <a href="anfragen.html" class="nav-button active">✉️ <span>Anfragen</span></a>
    </div>
  </nav>

  <main id="main-content" class="container">
    <section class="content-box">
      <h2>Anfrage senden</h2>
      <p>
        Über dieses Formular können organisatorische oder sportliche Anliegen
        direkt an die zuständige Rolle übermittelt werden.
      </p>
    </section>

    <section class="content-box">
      <form id="requestForm" class="request-form" novalidate>
        <div class="form-group">
          <label for="empfaenger">Empfänger</label>
          <select id="empfaenger" name="empfaenger">
            <option value="">Bitte auswählen</option>
            <option value="vorstand">Vorstand</option>
            <option value="trainer">Trainer</option>
          </select>
        </div>

        <div class="form-group">
          <label for="betreff">Betreff</label>
          <input
            type="text"
            id="betreff"
            name="betreff"
            placeholder="Betreff eingeben"
          />
        </div>

        <div class="form-group">
          <label for="nachricht">Nachricht</label>
          <textarea
            id="nachricht"
            name="nachricht"
            rows="6"
            placeholder="Nachricht eingeben"
          ></textarea>
        </div>

        <button type="button" onclick="submitRequest()">Anfrage senden</button>
        <p id="formMessage" class="info-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Prototype by Marius</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
